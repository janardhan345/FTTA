version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ftta-postgres
    environment:
      POSTGRES_DB: ftta_db
      POSTGRES_USER: ftta_user
      POSTGRES_PASSWORD: ftta_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ftta_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ftta-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://ftta_user:ftta_password@postgres:5432/ftta_db"
      JWT_SECRET: "your-secure-jwt-secret-key-change-in-production"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GOOGLE_CALLBACK_URL: "http://localhost:3000/api/v1/auth/google/callback"
      FACULTY_DOMAIN: "college.edu"
      ADMIN_EMAIL: "admin@college.edu"
      FRONTEND_URL: "http://localhost:5173"
      PORT: 3000
      QR_EXPIRY_MINUTES: 5
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev
    volumes:
      - ./backend/src:/app/src

  # Frontend UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ftta-frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: "http://localhost:3000/api/v1"
    depends_on:
      - backend

volumes:
  postgres_data:
